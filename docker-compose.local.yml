# docker compose -f docker-compose.local.yml up -d
# Dùng cho local development

services:

  mysql:
    image: mysql:8.4
    container_name: chillfilm_mysql_local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: movie_streaming_web
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_local:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chillfilm_local_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chillfilm_qdrant_local
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_local:/qdrant/storage
    networks:
      - chillfilm_local_net

  rag-chatbot:
    build:
      context: ./rag_chatbot
      dockerfile: Dockerfile
    image: chillfilm-rag:local
    container_name: chillfilm_rag_local
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: chillfilm_movies
      LLM_PROVIDER: none
      GEMINI_API_KEY: ""
      LOG_LEVEL: DEBUG
      # Legacy MySQL fallback
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: movie_streaming_web
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - chillfilm_local_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data_local:
    name: chillfilm_mysql_data_local
  qdrant_data_local:
    name: chillfilm_qdrant_data_local

networks:
  chillfilm_local_net:
    name: chillfilm_local_net
    driver: bridge
