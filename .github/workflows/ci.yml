name: ChillFilm CI

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    name: Backend CI (Java Spring Boot)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package Backend
        run: |
          cd backend
          mvn clean package -DskipTests

  frontend-ci:
    name: Frontend CI (React Vite TS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  chatbot-ci:
    name: Chatbot CI (Python RAG)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: rag_chatbot/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r rag_chatbot/requirements.txt

      - name: Verify Code Syntax
        run: |
          python -m py_compile rag_chatbot/*.py
