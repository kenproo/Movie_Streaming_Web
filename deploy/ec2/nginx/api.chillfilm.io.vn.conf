# /etc/nginx/sites-available/api.chillfilm.io.vn
# Sau khi copy, tạo symlink: ln -s /etc/nginx/sites-available/api.chillfilm.io.vn /etc/nginx/sites-enabled/
# Sau đó cài Certbot: sudo certbot --nginx -d api.chillfilm.io.vn

server {
    listen 80;
    server_name api.chillfilm.io.vn;

    # Redirect HTTP to HTTPS (Certbot sẽ tự thêm sau)
    # return 301 https://$host$request_uri;

    access_log /var/log/nginx/api.chillfilm.io.vn.access.log;
    error_log  /var/log/nginx/api.chillfilm.io.vn.error.log;

    # Regular API endpoints
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        client_max_body_size 20M;
    }

    # Chatbot endpoint — longer timeout
    location /api/rag/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        client_max_body_size 1M;
    }

    location /api/chatbot/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        client_max_body_size 1M;
    }
}

# HTTPS block sẽ được Certbot tự thêm
