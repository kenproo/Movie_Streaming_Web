spring:
  application:
    name: movie-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  signerKey: aVeryLongSecretKeyThatIsAtLeast64BytesLongForHS512EncryptionAndShouldBeSuperSecureAndSafe!
  valid-duration: 86400
  refreshable-duration: 604800

external:
  pexels:
    base-url: https://api.pexels.com
    api-key: dummy_key
    enabled: false

rag:
  service:
    url: http://localhost:8000

qdrant:
  url: http://localhost:6333

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
