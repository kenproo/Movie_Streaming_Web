spring:
  application:
    name: movie-service
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

qdrant:
  url: ${QDRANT_URL:http://localhost:6333}
  collection-name: ${QDRANT_COLLECTION:chillfilm_movies}

chillfilm:
  import:
    enabled: false
    data-dir: ${CHILLFILM_IMPORT_DIR:./import-data}
    s3-public-base-url: ${CHILLFILM_S3_PUBLIC_BASE_URL:https://chillfilm-assets-07072026.s3.ap-southeast-1.amazonaws.com/posters}
    overwrite-existing: true
    default-status: PUBLISHED
    default-movie-type: SINGLE
    default-quality: HD
    default-language: Vietsub
