spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

jwt:
  signerKey: ${JWT_SECRET}
  valid-duration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refreshable-duration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

external:
  pexels:
    api-key: ${PEXELS_API_KEY:}
    enabled: false

rag:
  service:
    url: ${RAG_BASE_URL:http://rag-chatbot:8000}
    timeout-seconds: ${RAG_TIMEOUT_SECONDS:20}

qdrant:
  url: ${QDRANT_URL:http://qdrant:6333}
  collection-name: ${QDRANT_COLLECTION:chillfilm_movies}

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}

s3:
  bucket: ${AWS_S3_BUCKET:}
  region: ${AWS_REGION:ap-southeast-1}

app:
  cors:
    allowed-origins: ${FRONTEND_URL:https://chillfilm.io.vn,https://www.chillfilm.io.vn}
